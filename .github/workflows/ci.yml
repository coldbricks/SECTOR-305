name: ci

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Core invariants
        run: npm test
      - name: Production build
        run: npm run build
      - name: Validate doctrine pack
        run: npm run validate:packs
      - name: Intentional fail simulation
        run: npm run sim -w @sector305/core -- fail
      - name: Canonical pass simulation
        run: npm run sim -w @sector305/core -- pass
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser acceptance
        run: npm run test:e2e
