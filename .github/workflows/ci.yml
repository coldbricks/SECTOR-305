name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm install
      - run: npm test
      - run: npm run validate:packs -w @sector305/core
      - run: npm run sim -w @sector305/core -- fail
      - run: npm run sim -w @sector305/core -- pass
